<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地鼠大戰 - 網頁版</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f8ff;
            margin: 0;
            user-select: none;
        }

        h1 { margin-top: 20px; color: #333; }

        .stats {
            font-size: 24px;
            margin: 10px;
        }

        /* 遊戲場地 */
        .game-container {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 120px);
            gap: 20px;
            background-color: #7d5a50;
            padding: 20px;
            border-radius: 15px;
            border: 8px solid #5d4037;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* 地洞 */
        .hole {
            width: 120px;
            height: 120px;
            background-color: #3e2723;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 10px 0 rgba(0,0,0,0.5);
        }

        /* 地鼠 */
        .mole {
            width: 80px;
            height: 90px;
            background-color: #a1887f;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            left: 20px;
            bottom: -100%; /* 初始隱藏在洞下 */
            transition: bottom 0.1s ease;
            cursor: pointer;
            border: 2px solid #5d4037;
        }

        /* 地鼠眼睛和鼻子 */
        .mole::before {
            content: '👀';
            position: absolute;
            top: 20px;
            left: 25px;
            font-size: 20px;
        }

        /* 當地鼠出現時的 class */
        .mole.up {
            bottom: 10px;
        }

        button {
            margin-top: 30px;
            padding: 10px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        button:hover { background-color: #45a049; }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>

    <h1>地鼠大戰 Whack-a-Mole!</h1>
    
    <div class="stats">
        得分: <span id="score">0</span> | 剩餘時間: <span id="time">20</span>s
    </div>

    <div class="game-container">
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
        <div class="hole"><div class="mole"></div></div>
    </div>

    <button id="start-btn">開始遊戲</button>

    <script>
        const holes = document.querySelectorAll('.hole');
        const moles = document.querySelectorAll('.mole');
        const scoreBoard = document.querySelector('#score');
        const timeBoard = document.querySelector('#time');
        const startBtn = document.querySelector('#start-btn');

        let score = 0;
        let timeLimit = 20;
        let gameActive = false;
        let lastHole;

        // 隨機時間
        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        // 隨機洞口
        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) return randomHole(holes);
            lastHole = hole;
            return hole;
        }

        // 地鼠冒頭
        function peep() {
            const time = randomTime(500, 1000); // 地鼠停留 0.5~1 秒
            const hole = randomHole(holes);
            const mole = hole.querySelector('.mole');
            
            mole.classList.add('up');

            setTimeout(() => {
                mole.classList.remove('up');
                if (gameActive) peep();
            }, time);
        }

        // 打地鼠邏輯
        function whack(e) {
            if (!e.isTrusted) return; // 防止作弊程式觸發點擊
            score++;
            this.classList.remove('up');
            scoreBoard.textContent = score;
        }

        // 開始遊戲
        function startGame() {
            score = 0;
            timeLimit = 20;
            gameActive = true;
            scoreBoard.textContent = 0;
            timeBoard.textContent = timeLimit;
            startBtn.disabled = true;

            peep();

            // 倒數計時
            const countdown = setInterval(() => {
                timeLimit--;
                timeBoard.textContent = timeLimit;
                if (timeLimit <= 0) {
                    clearInterval(countdown);
                    gameActive = false;
                    startBtn.disabled = false;
                    alert('遊戲結束！你的得分是：' + score);
                }
            }, 1000);
        }

        moles.forEach(mole => mole.addEventListener('click', whack));
        startBtn.addEventListener('click', startGame);

    </script>
</body>
</html>
