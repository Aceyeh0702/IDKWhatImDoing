<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地鼠大戰 - 網頁版</title>
    <style>
        :root {
            --grass-color: #2e7d32;
            --hole-color: #5d4037;
            --mole-color: #795548;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 { color: #333; margin-bottom: 10px; }

        .game-info {
            margin-bottom: 20px;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .score-board { color: #d32f2f; margin-right: 20px; }
        .time-left { color: #1976d2; }

        /* 遊戲地圖 */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 120px);
            gap: 20px;
            background-color: var(--grass-color);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .hole {
            background-color: var(--hole-color);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 4px solid #3e2723;
            box-shadow: inset 0 10px 10px rgba(0,0,0,0.5);
        }

        /* 地鼠本體 */
        .mole {
            width: 80%;
            height: 80%;
            background-color: var(--mole-color);
            border-radius: 50% 50% 0 0;
            position: absolute;
            bottom: -100%; /* 預設藏起來 */
            left: 10%;
            transition: bottom 0.1s ease-out;
            cursor: pointer;
        }

        .mole::after {
            content: "👀"; /* 眼睛 */
            font-size: 20px;
            position: absolute;
            top: 15px;
            left: 20px;
        }

        .mole.
